<!--
  Supabase → Authentication → Emails → Reset password
  Coller ce HTML dans « Message body ».
  Objet (Subject) : voir INSTRUCTIONS.txt
-->
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f4f5;padding:24px 12px;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
  <tr>
    <td align="center">
      <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:520px;background-color:#ffffff;border-radius:12px;overflow:hidden;border:1px solid #e4e4e7;">
        <tr>
          <td style="padding:28px 24px 8px 24px;">
            <p style="margin:0 0 8px 0;font-size:20px;font-weight:700;color:#18181b;">ReglePro</p>
            <p style="margin:0;font-size:15px;line-height:1.55;color:#3f3f46;">
              Une demande de nouveau mot de passe a été faite pour votre compte. Si ce n’est pas vous, ignorez cet e-mail.
            </p>
          </td>
        </tr>
        <tr>
          <td style="padding:8px 24px 24px 24px;" align="center">
            <a href="{{ .ConfirmationURL }}"
               style="display:inline-block;padding:14px 28px;background-color:#2563eb !important;color:#ffffff !important;text-decoration:none !important;font-weight:600;font-size:15px;border-radius:8px;">
              Choisir un nouveau mot de passe
            </a>
          </td>
        </tr>
        <tr>
          <td style="padding:0 24px 24px 24px;">
            <p style="margin:0;font-size:13px;line-height:1.5;color:#71717a;">
              Lien direct :<br />
              <span style="word-break:break-all;color:#2563eb;">{{ .ConfirmationURL }}</span>
            </p>
          </td>
        </tr>
      </table>
      <p style="margin:16px 0 0 0;font-size:12px;color:#a1a1aa;max-width:520px;">
        Compte concerné : {{ .Email }}
      </p>
    </td>
  </tr>
</table>
